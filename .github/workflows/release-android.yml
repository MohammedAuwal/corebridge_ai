name: Release Android (APK + AAB)

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version name (e.g. 1.0.0)"
        required: true
        default: "1.0.0"
      version_code:
        description: "Version code (integer, must increase each release)"
        required: true
        default: "1"
      app_icon_url:
        description: "Direct URL to a PNG app icon. Leave blank to use the APP_ICON_URL repo variable."
        required: false
        default: ""
  push:
    branches: ["main"]
    paths:
      - "apps/mobile/**"
    tags:
      - "v*.*.*"

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.8"
          channel: "stable"
          cache: true

      - name: Resolve app icon URL
        id: icon_url
        run: |
          if [ -n "${{ github.event.inputs.app_icon_url }}" ]; then
            echo "url=${{ github.event.inputs.app_icon_url }}" >> "$GITHUB_OUTPUT"
          else
            echo "url=${{ vars.APP_ICON_URL }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download app icon (with fallback placeholder)
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p assets/icon
          ICON_PATH="assets/icon/icon.png"
          ICON_URL="${{ steps.icon_url.outputs.url }}"
          ICON_OK=0

          is_valid_image() {
            [ -f "$1" ] && [ "$(wc -c < "$1")" -gt 1000 ] && file "$1" | grep -qiE "PNG|image"
          }

          if [ -n "$ICON_URL" ]; then
            echo "Attempt 1: direct curl download..."
            curl -fsSL --retry 3 --retry-delay 3 --max-time 60 \
              -A "Mozilla/5.0 (X11; Linux x86_64)" \
              "$ICON_URL" -o "$ICON_PATH" || true

            if is_valid_image "$ICON_PATH"; then
              echo "Attempt 1 succeeded."
              ICON_OK=1
            else
              rm -f "$ICON_PATH"
              echo "Attempt 1 failed, trying wget..."
              wget --no-check-certificate -q -O "$ICON_PATH" "$ICON_URL" || true
              if is_valid_image "$ICON_PATH"; then
                echo "Attempt 2 (wget) succeeded."
                ICON_OK=1
              else
                rm -f "$ICON_PATH"
              fi
            fi
          else
            echo "No icon URL provided (input or APP_ICON_URL variable both empty)."
          fi

          if [ "$ICON_OK" -eq 0 ]; then
            echo "Falling back to a generated placeholder icon..."
            sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends imagemagick
            convert -size 1024x1024 xc:"#191919" \
              -fill "#D97757" -gravity center -pointsize 400 \
              -annotate 0 "C" "$ICON_PATH" 2>/dev/null || \
            python3 - <<'PYEOF'
          import struct, zlib, pathlib
          def make_png(size=1024, rgb=(25,25,25)):
              def chunk(tag, data):
                  c = zlib.crc32(tag + data) & 0xffffffff
                  return struct.pack(">I", len(data)) + tag + data + struct.pack(">I", c)
              sig = b'\x89PNG\r\n\x1a\n'
              ihdr = chunk(b'IHDR', struct.pack(">IIBBBBB", size, size, 8, 2, 0, 0, 0))
              row = b'\x00' + bytes(rgb) * size
              idat = chunk(b'IDAT', zlib.compress(row * size, 1))
              iend = chunk(b'IEND', b'')
              return sig + ihdr + idat + iend
          pathlib.Path("assets/icon/icon.png").write_bytes(make_png())
          PYEOF
            echo "::warning::Using a generated placeholder icon — set the APP_ICON_URL repo variable to a real direct image URL."
          fi

          echo "=== Final icon check ==="
          file "$ICON_PATH"
          wc -c < "$ICON_PATH"

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/v}"
            echo "version_name=$TAG" >> "$GITHUB_OUTPUT"
            echo "version_code=${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "push" ]; then
            echo "version_name=1.0.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
            echo "version_code=${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "version_name=${{ github.event.inputs.version_name }}" >> "$GITHUB_OUTPUT"
            echo "version_code=${{ github.event.inputs.version_code }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Get Flutter packages
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Restore Android keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is missing."
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/corebridge-release.jks
          echo "Keystore size: $(wc -c < android/app/corebridge-release.jks) bytes"

      - name: Verify keystore
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          keytool -list -keystore android/app/corebridge-release.jks \
            -alias "$KEY_ALIAS" -storepass "$STORE_PASSWORD" | grep -E "Alias|fingerprint" || true

      - name: Write key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat > android/key.properties <<KEYPROPS
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=corebridge-release.jks
          KEYPROPS

      - name: Restore google-services.json
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -z "${GOOGLE_SERVICES_JSON_BASE64:-}" ]; then
            echo "::error::GOOGLE_SERVICES_JSON_BASE64 secret is missing."
            exit 1
          fi
          echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 -d > android/app/google-services.json

      - name: Set pubspec version
        run: |
          VERSION_NAME="${{ steps.version.outputs.version_name }}"
          VERSION_CODE="${{ steps.version.outputs.version_code }}"
          sed -i "s/^version:.*/version: ${VERSION_NAME}+${VERSION_CODE}/" pubspec.yaml
          grep "^version:" pubspec.yaml

      - name: Build release APK
        run: |
          flutter build apk --release \
            --no-tree-shake-icons \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=SUPABASE_FUNCTIONS_URL=${{ secrets.SUPABASE_FUNCTIONS_URL }} \
            --dart-define=CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}

      - name: Build release AAB
        run: |
          flutter build appbundle --release \
            --no-tree-shake-icons \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=SUPABASE_FUNCTIONS_URL=${{ secrets.SUPABASE_FUNCTIONS_URL }} \
            --dart-define=CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}

      - name: Verify build outputs
        run: |
          APK="build/app/outputs/flutter-apk/app-release.apk"
          AAB="build/app/outputs/bundle/release/app-release.aab"
          [ -f "$APK" ] || { echo "::error::APK not found"; exit 1; }
          [ -f "$AAB" ] || { echo "::error::AAB not found"; exit 1; }
          echo "APK: $(du -h "$APK" | cut -f1)"
          echo "AAB: $(du -h "$AAB" | cut -f1)"

      - name: Rename artifacts
        run: |
          mkdir -p release_output
          cp build/app/outputs/flutter-apk/app-release.apk \
             release_output/corebridge-ai-${{ steps.version.outputs.version_name }}.apk
          cp build/app/outputs/bundle/release/app-release.aab \
             release_output/corebridge-ai-${{ steps.version.outputs.version_name }}.aab

      - name: Upload build artifacts (workflow run)
        uses: actions/upload-artifact@v4
        with:
          name: corebridge-android-${{ steps.version.outputs.version_name }}
          path: apps/mobile/release_output/*
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version_name }}
          name: CoreBridge AI v${{ steps.version.outputs.version_name }}
          generate_release_notes: true
          files: |
            apps/mobile/release_output/*.apk
            apps/mobile/release_output/*.aab

      - name: Clean up secrets from disk
        if: always()
        run: |
          rm -f android/app/corebridge-release.jks
          rm -f android/key.properties
          rm -f android/app/google-services.json
