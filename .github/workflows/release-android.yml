name: Release Android (APK + AAB)

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version name (e.g. 1.0.0)"
        required: true
        default: "1.0.0"
      version_code:
        description: "Version code (integer, must increase each release)"
        required: true
        default: "1"
      app_icon_url:
        description: "Direct URL to a PNG app icon (min 512x512). Leave blank to reuse the repo variable APP_ICON_URL."
        required: false
        default: "https://drive.google.com/uc?export=download&id=1hSe-4Pc2j1MrqBH4ixgpIn0nxfq6XjOZ"
  push:
    branches: [ "master", "main" ]
    paths:
      - 'apps/mobile/**'
    tags:
      - "v*.*.*"

jobs:
  build-release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Resolve app icon URL
        id: icon_url
        run: |
          if [ -n "${{ github.event.inputs.app_icon_url }}" ]; then
            echo "url=${{ github.event.inputs.app_icon_url }}" >> "$GITHUB_OUTPUT"
          else
            echo "url=https://drive.google.com/uc?export=download&id=1hSe-4Pc2j1MrqBH4ixgpIn0nxfq6XjOZ" >> "$GITHUB_OUTPUT"
          fi

      - name: Download and apply app icon
        run: |
          mkdir -p assets/icon
          ICON_URL="${{ steps.icon_url.outputs.url }}"
          if [ -z "$ICON_URL" ]; then
            echo "No icon URL provided (workflow input or APP_ICON_URL repo variable). Using existing placeholder."
          else
            echo "Downloading icon from $ICON_URL"
            curl -L --fail -o assets/icon/icon.png "$ICON_URL"
            file assets/icon/icon.png
          fi

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
              TAG="${GITHUB_REF#refs/tags/v}"
              echo "version_name=$TAG" >> "$GITHUB_OUTPUT"
            else
              echo "version_name=1.0.0" >> "$GITHUB_OUTPUT"
            fi
            echo "version_code=${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "version_name=${{ github.event.inputs.version_name }}" >> "$GITHUB_OUTPUT"
            echo "version_code=${{ github.event.inputs.version_code }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Get Flutter packages
        run: flutter pub get

      - name: Generate launcher icons from downloaded image
        run: dart run flutter_launcher_icons

      - name: Restore Android keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/corebridge-release.jks

      - name: Write key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat > android/key.properties <<KEYPROPS
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=corebridge-release.jks
          KEYPROPS

      - name: Restore google-services.json
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 -d > android/app/google-services.json

      - name: Set pubspec version
        run: |
          VERSION_NAME="${{ steps.version.outputs.version_name }}"
          VERSION_CODE="${{ steps.version.outputs.version_code }}"
          sed -i "s/^version:.*/version: ${VERSION_NAME}+${VERSION_CODE}/" pubspec.yaml
          cat pubspec.yaml | grep "^version:"

      - name: Build release APK
        run: |
          flutter build apk --release \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=SUPABASE_FUNCTIONS_URL=${{ secrets.SUPABASE_FUNCTIONS_URL }} \
            --dart-define=CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}

      - name: Build release AAB
        run: |
          flutter build appbundle --release \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=SUPABASE_FUNCTIONS_URL=${{ secrets.SUPABASE_FUNCTIONS_URL }} \
            --dart-define=CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}

      - name: Rename artifacts
        run: |
          mkdir -p release_output
          cp build/app/outputs/flutter-apk/app-release.apk \
             release_output/corebridge-ai-${{ steps.version.outputs.version_name }}.apk
          cp build/app/outputs/bundle/release/app-release.aab \
             release_output/corebridge-ai-${{ steps.version.outputs.version_name }}.aab

      - name: Upload build artifacts (workflow run)
        uses: actions/upload-artifact@v4
        with:
          name: corebridge-android-${{ steps.version.outputs.version_name }}
          path: apps/mobile/release_output/*

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version_name }}
          name: CoreBridge AI v${{ steps.version.outputs.version_name }}
          generate_release_notes: true
          files: |
            apps/mobile/release_output/*.apk
            apps/mobile/release_output/*.aab

      - name: Clean up secrets from disk
        if: always()
        run: |
          rm -f android/app/corebridge-release.jks
          rm -f android/key.properties
          rm -f android/app/google-services.json
