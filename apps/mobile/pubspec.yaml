name: corebridge_mobile
description: CoreBridge AI — premium AI workspace, mobile app.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.0

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1

  # Supabase
  supabase_flutter: ^2.5.9

  # Local cache / offline queue
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI
  flutter_animate: ^4.5.0
  flutter_markdown: ^0.7.3
  fl_chart: ^0.68.0

  # Utilities
  equatable: ^2.0.5
  uuid: ^4.4.2
  intl: ^0.19.0
  file_picker: ^8.0.6
  connectivity_plus: ^6.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.11
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  min_sdk_android: 23
  adaptive_icon_background: "#191919"
  adaptive_icon_foreground: "assets/icon/icon.png"
